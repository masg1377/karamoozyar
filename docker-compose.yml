version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: karamooziyar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-karamooziyar}
      POSTGRES_USER: ${POSTGRES_USER:-karamooz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-karamooz_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karamooz_user} -d ${POSTGRES_DB:-karamooziyar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - karamooziyar_net

  redis:
    image: redis:7-alpine
    container_name: karamooziyar_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_password} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - karamooziyar_net

  minio:
    image: minio/minio:latest
    container_name: karamooziyar_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret_2024}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - karamooziyar_net

  # MinIO bucket creation (runs once at startup)
  minio_init:
    image: minio/mc:latest
    container_name: karamooziyar_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret_2024};
        mc mb --ignore-existing myminio/${MINIO_BUCKET:-karamooziyar};
        mc anonymous set none myminio/${MINIO_BUCKET:-karamooziyar};
        echo 'MinIO bucket initialized';
        exit 0;
      "
    networks:
      - karamooziyar_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  karamooziyar_net:
    driver: bridge
